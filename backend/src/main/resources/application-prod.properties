# Activate with: SPRING_PROFILES_ACTIVE=prod
# Set all secrets as environment variables. Do not commit real values.

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Required env vars (no insecure defaults):
# JWT_SECRET
# SPRING_DATASOURCE_URL
# SPRING_DATASOURCE_USERNAME
# SPRING_DATASOURCE_PASSWORD
# CORS_ALLOWED_ORIGINS
# PAYMONGO_SECRET_KEY
# PAYMONGO_PUBLIC_KEY
# PAYMONGO_WEBHOOK_SECRET
# APP_WEB_BASE_URL (or PAYMONGO_SUCCESS_URL + PAYMONGO_CANCEL_URL)
# CORS_ALLOWED_ORIGINS

jwt.secret=${JWT_SECRET}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

paymongo.mock-enabled=false
paymongo.secret-key=${PAYMONGO_SECRET_KEY}
paymongo.public-key=${PAYMONGO_PUBLIC_KEY}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET}
app.web-base-url=${APP_WEB_BASE_URL:}
paymongo.success-url=${PAYMONGO_SUCCESS_URL:}
paymongo.cancel-url=${PAYMONGO_CANCEL_URL:}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
