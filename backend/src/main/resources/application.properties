spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARACTERS_LONG
jwt.expiration=86400000

paymongo.secret-key=${PAYMONGO_SECRET_KEY:}
paymongo.public-key=${PAYMONGO_PUBLIC_KEY:}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET:}
paymongo.success-url=${PAYMONGO_SUCCESS_URL:http://localhost:5173/payment/success}
paymongo.cancel-url=${PAYMONGO_CANCEL_URL:http://localhost:5173/payment/cancel}
paymongo.mock-enabled=${PAYMONGO_MOCK_ENABLED:false}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

