# Non-secret defaults. Set real values via env vars / backend/.env (local).
# Do not put passwords or API keys in this file.

spring.application.name=lim.gymtrack

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

paymongo.secret-key=${PAYMONGO_SECRET_KEY:}
paymongo.public-key=${PAYMONGO_PUBLIC_KEY:}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET:}
app.web-base-url=${APP_WEB_BASE_URL:http://localhost:5173}
paymongo.success-url=${PAYMONGO_SUCCESS_URL:}
paymongo.cancel-url=${PAYMONGO_CANCEL_URL:}
paymongo.mock-enabled=${PAYMONGO_MOCK_ENABLED:true}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

spring.config.import=optional:classpath:application-local.properties

server.port=8080
